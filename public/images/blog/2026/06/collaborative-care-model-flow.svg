<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" style="background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b" />
    </marker>
    <linearGradient id="pcp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="consult-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="bhcm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
  </defs>

  <!-- PCP Node -->
  <rect x="40" y="40" width="220" height="80" rx="10" fill="url(#pcp-grad)" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))" />
  <text x="150" y="75" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">Primary Care Provider</text>
  <text x="150" y="95" text-anchor="middle" fill="#ccfbf1" font-size="12">PCP: Clinical Lead &amp; Prescriber</text>

  <!-- Psychiatric Consultant Node -->
  <rect x="540" y="40" width="220" height="80" rx="10" fill="url(#consult-grad)" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))" />
  <text x="650" y="75" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">Psychiatric Consultant</text>
  <text x="650" y="95" text-anchor="middle" fill="#e0f2fe" font-size="12">Oasis Psychiatric Expert</text>

  <!-- BHCM Node (Center Bottom) -->
  <rect x="250" y="220" width="300" height="110" rx="10" fill="url(#bhcm-grad)" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))" />
  <text x="400" y="248" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Behavioral Health Care Manager</text>
  <text x="400" y="268" text-anchor="middle" fill="#f5f3ff" font-size="12" font-style="italic">The Pivotal Coordinator &amp; Therapist</text>
  <line x1="280" y1="285" x2="520" y2="285" stroke="#a78bfa" stroke-width="1" />
  <text x="270" y="303" fill="#f5f3ff" font-size="11.5">• Conducts assessments (PHQ-9/GAD-7)</text>
  <text x="270" y="320" fill="#f5f3ff" font-size="11.5">• Delivers brief therapies (CBT, BA, PST)</text>

  <!-- Connectors -->
  <!-- 1. PCP to BHCM (Warm Handoff) -->
  <path d="M 150 120 L 150 275 L 242 275" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#arrow)" />
  <rect x="70" y="165" width="160" height="40" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="150" y="181" text-anchor="middle" fill="#334155" font-size="11" font-weight="bold">1. Warm Handoff</text>
  <text x="150" y="196" text-anchor="middle" fill="#64748b" font-size="10.5">Clinical Identification</text>

  <!-- 2. BHCM to Psychiatric Consultant (Weekly Registry Consult) -->
  <path d="M 550 275 L 650 275 L 650 128" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#arrow)" />
  <rect x="560" y="165" width="180" height="40" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="650" y="181" text-anchor="middle" fill="#334155" font-size="11" font-weight="bold">2. Registry Review</text>
  <text x="650" y="196" text-anchor="middle" fill="#64748b" font-size="10.5">Weekly Caseload Consult</text>

  <!-- 3. Psychiatric Consultant to PCP (Treatment Advice) -->
  <path d="M 540 80 L 268 80" fill="none" stroke="#0d9488" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="300" y="55" width="200" height="48" rx="5" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" />
  <text x="400" y="72" text-anchor="middle" fill="#0f766e" font-size="11" font-weight="bold">3. Treatment Recommendations</text>
  <text x="400" y="87" text-anchor="middle" fill="#115e59" font-size="10">Consultant advises; PCP prescribes</text>
</svg>
